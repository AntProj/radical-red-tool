<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radical Red Pokédex</title>
<meta name="description" content="A Pokédex, location guide, and Hardcore boss reference for the Pokémon Radical Red romhack.">
<link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
<div id="app" hidden>
  <header id="topbar">
    <div class="brand">Radical Red<span>Pokédex</span></div>
    <nav id="tabs">
      <button data-mode="areas">Areas</button>
      <button data-mode="hardcore" class="active">Hardcore</button>
      <button data-mode="calc">Calc</button>
      <button data-mode="box">Box</button>
    </nav>
    <button id="split-btn" title="Open a second pane side-by-side">⊟ Split</button>
    <nav id="tabs-right" hidden>
      <span class="tabs-label">▕ right:</span>
      <button data-rmode="areas">Areas</button>
      <button data-rmode="hardcore">Hardcore</button>
      <button data-rmode="calc">Calc</button>
      <button data-rmode="box">Box</button>
    </nav>
  </header>

  <div id="views">
    <!-- AREAS: full width -->
    <section id="view-areas" class="view fullview" hidden>
      <div id="ar-body"></div>
    </section>

    <!-- HARDCORE: full width -->
    <section id="view-hardcore" class="view fullview" hidden>
      <div id="hc-body"></div>
    </section>

    <!-- CALC: embedded Radical Red damage calculator -->
    <section id="view-calc" class="view" hidden>
      <iframe id="calc-frame" title="Radical Red Damage Calculator" data-src="calc/index.html"></iframe>
    </section>

    <!-- BOX: import a .sav and view your caught Pokémon -->
    <section id="view-box" class="view fullview" hidden>
      <div id="box-body"></div>
    </section>
  </div>
</div>

<div id="modal" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal-box" role="dialog" aria-modal="true">
    <button class="modal-x" data-close aria-label="Close">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">Loading Radical Red data…</div>
</div>

<script src="sav.js?v=7"></script>
<script src="app.js?v=7"></script>
</body>
</html>
