<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radical Red Pokédex</title>
<meta name="description" content="A Pokédex for the Pokémon Radical Red romhack.">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app" hidden>
  <aside id="sidebar">
    <header id="sidebar-head">
      <h1>Radical Red<span>Pokédex</span></h1>
      <input id="search" type="search" placeholder="Search name, #number, or type…" autocomplete="off" spellcheck="false">
      <div id="result-count"></div>
    </header>
    <ul id="list" role="listbox" aria-label="Pokémon list"></ul>
  </aside>
  <main id="detail" tabindex="0" aria-live="polite">
    <div id="detail-content"></div>
  </main>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">Loading Radical Red data…</div>
</div>

<script src="app.js"></script>
</body>
</html>
