<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radical Red — Sprite Viewer</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 14px/1.4 system-ui, sans-serif;
    background: #14161a; color: #e6e6e6;
  }
  header {
    position: sticky; top: 0; z-index: 1;
    padding: 14px 18px; background: #1d2026; border-bottom: 1px solid #2c313a;
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
  }
  h1 { font-size: 16px; margin: 0; font-weight: 600; }
  #search {
    flex: 1; min-width: 180px; max-width: 360px;
    padding: 7px 11px; border-radius: 7px;
    border: 1px solid #3a4150; background: #0f1115; color: #e6e6e6; font-size: 14px;
  }
  #count { color: #8b93a1; font-size: 13px; }
  #grid {
    display: grid; gap: 10px; padding: 18px;
    grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
  }
  .cell {
    background: #1d2026; border: 1px solid #2c313a; border-radius: 9px;
    padding: 8px 6px 6px; text-align: center;
  }
  .cell img {
    width: 72px; height: 72px; object-fit: contain;
    image-rendering: pixelated;             /* crisp pixel art when upscaled */
    background: #0f1115; border-radius: 6px;
  }
  .cell .name { margin-top: 6px; font-size: 12px; line-height: 1.25; }
  .cell .id { color: #7d8593; font-size: 11px; }
  .cell.missing img {
    display: flex; align-items: center; justify-content: center;
  }
  .cell.placeholder img { opacity: .55; }
  .cell .ph { color: #c98b3a; font-size: 10px; margin-top: 2px; }
  .section { padding: 4px 18px 0; color: #8b93a1; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  #error {
    margin: 40px auto; max-width: 640px; padding: 20px 24px;
    background: #2a1d1d; border: 1px solid #5a2d2d; border-radius: 10px; color: #ffd7d7;
  }
  #error code { background: #00000055; padding: 2px 6px; border-radius: 4px; }
  a { color: #7db1ff; }
</style>
</head>
<body>
<header>
  <h1>Radical Red — Sprites</h1>
  <input id="search" placeholder="Filter by name or ID…" autocomplete="off">
  <span id="count"></span>
</header>

<div id="cats" class="section" hidden>Move-category icons</div>
<div id="catgrid" class="cell-host"></div>
<div id="grid"></div>

<script>
const SPRITE_PREFIX = 'sprites['; // just for reference
let ALL = [];

async function load() {
  let sprites, species;
  try {
    [sprites, species] = await Promise.all([
      fetch('data/sprites.json').then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
      fetch('data/species.json').then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
    ]);
  } catch (e) {
    showError(e);
    return;
  }

  // Move-category icons (non-numeric keys).
  const catHost = document.getElementById('catgrid');
  ['Physical', 'Special', 'Status'].forEach(k => {
    if (sprites[k]) catHost.appendChild(cell(sprites[k], k, ''));
  });
  if (catHost.children.length) {
    document.getElementById('cats').hidden = false;
    catHost.className = '';
    Object.assign(catHost.style, { display: 'flex', gap: '10px', padding: '8px 18px 0' });
  }

  // One cell per species. Sprites are keyed by species ID; the ~20 newer forms
  // without their own sprite fall back to sprites[0], the missing-sprite
  // placeholder. (Never fall back to dexID — that's a different species' ID.)
  ALL = Object.values(species).map(s => ({
    name: s.name,
    id: s.ID,
    src: sprites[s.ID] ?? sprites[0] ?? null,
    placeholder: !(String(s.ID) in sprites),
  }));
  render('');
}

function cell(src, name, idLabel, placeholder) {
  const d = document.createElement('div');
  d.className = 'cell' + (src ? '' : ' missing') + (placeholder ? ' placeholder' : '');
  const img = document.createElement('img');
  if (src) { img.src = src; img.loading = 'lazy'; img.alt = name; }
  else { img.alt = ''; img.style.outline = '1px dashed #5a2d2d'; }
  d.appendChild(img);
  const n = document.createElement('div'); n.className = 'name'; n.textContent = name;
  d.appendChild(n);
  if (idLabel !== '') { const i = document.createElement('div'); i.className = 'id'; i.textContent = idLabel; d.appendChild(i); }
  if (placeholder) { const p = document.createElement('div'); p.className = 'ph'; p.textContent = 'no sprite — placeholder'; d.appendChild(p); }
  return d;
}

function render(q) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const needle = q.trim().toLowerCase();
  const rows = ALL.filter(r =>
    !needle || r.name.toLowerCase().includes(needle) || String(r.id) === needle);
  const frag = document.createDocumentFragment();
  for (const r of rows) frag.appendChild(cell(r.src, r.name, '#' + r.id, r.placeholder));
  grid.appendChild(frag);
  document.getElementById('count').textContent =
    rows.length + ' / ' + ALL.length + ' shown';
}

function showError(e) {
  document.body.innerHTML =
    '<div id="error"><b>Could not load the data files.</b><br><br>' +
    'This page must be served over <code>http://</code>, not opened as a ' +
    '<code>file://</code> path (browsers block <code>fetch</code> of local files).<br><br>' +
    'From the project folder run:<br><br>' +
    '<code>python -m http.server 8000</code><br><br>' +
    'then open <a href="http://localhost:8000/sprite-viewer.html">' +
    'http://localhost:8000/sprite-viewer.html</a><br><br>' +
    '<small>(' + e + ')</small></div>';
}

document.getElementById('search').addEventListener('input', e => render(e.target.value));
load();
</script>
</body>
</html>
